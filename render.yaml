services:
  # ── Backend (FastAPI + PostgreSQL) ───────────────────────────────────────────
  - type: web
    name: triagent-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: triagent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false            # set manually in Render dashboard
      - key: GOOGLE_CLIENT_SECRET_JSON
        sync: false            # paste the full contents of your web-type client_secret.json
      - key: GOOGLE_REDIRECT_URI
        sync: false            # e.g. https://triagent-backend.onrender.com/api/auth/callback
      - key: FRONTEND_URL
        sync: false            # e.g. https://triagent-frontend.onrender.com

  # ── Frontend (React / Vite → static site) ────────────────────────────────────
  - type: web
    name: triagent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false            # e.g. https://triagent-backend.onrender.com

# ── PostgreSQL database ────────────────────────────────────────────────────────
databases:
  - name: triagent-db
    databaseName: triagent
    user: triagent
    plan: free
